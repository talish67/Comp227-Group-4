<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Map Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#C9A70E;
}

/* HEADER */
.header{
    position:relative;
    height:220px;
}

.logo{
    position:absolute;
    top:10px;
    right:30px;
    width:140px;
}

/* NAVIGATION */
.navbar{
    width:100%;
    display:flex;
    margin-top:20px;
    border-radius:40px;
    overflow:hidden;
    border:2px solid #2c2c2c;
}

.nav-item{
    display:flex;
    align-items:center;
    background:#73906A;
    height:110px;
}

.nav-item.text{
    flex:1;
    padding-left:15px;
    font-size:3rem;
}

.nav-item.icon{
    width:110px;
    justify-content:center;
    background:#D7DDD4;
}

.nav-item img{
    width:60px;
    height:60px;
    object-fit:contain;
}

/* MAIN SECTION */
.main-content{
    background:#D9D9D9;
    min-height:650px;
    display:flex;
    margin-top:80px;
}

/* LEFT PANEL */
.left-panel{
    width:70%;
}

.page-title{
    background:#73906A;
    color:white;
    font-size:4rem;
    padding:20px;
    width:380px;
}

.map-container{
    margin-top:20px;
    width:100%;
    height:470px;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

.map-container img{
    max-width:100%;
    max-height:100%;
}

/* RIGHT PANEL */
.right-panel{
    width:30%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:70px;
}

.building-btn{
    background:#73906A;
    color:white;
    font-size:3rem;
    border:none;
    border-radius:40px;
    width:80%;
    padding:25px;
    cursor:pointer;
}

.building-btn:hover{
    opacity:0.9;
}

@media(max-width:1000px){

    .navbar{
        flex-wrap:wrap;
    }

    .main-content{
        flex-direction:column;
    }

    .left-panel,
    .right-panel{
        width:100%;
    }

    .right-panel{
        padding:40px 0;
    }

    .building-btn{
        width:90%;
    }
}
</style>
</head>

<body>

<header class="header">

    <!-- DSC Logo -->
    <img src="./dsc-logo-2-1 (1).png" alt="DSC Logo" class="logo">

    <nav class="navbar">

        <div class="nav-item text">Home</div>

        <div class="nav-item icon">
            <!-- Home Icon -->
            <img src="./home.png" alt="Home">
        </div>

        <div class="nav-item text">3D Map Page</div>

        <div class="nav-item icon">
            <!-- Map Icon -->
            <img src="./map.png.jpeg" alt="Map">
        </div>

        <div class="nav-item text">Directory</div>

        <div class="nav-item icon">
            <!-- Directory Icon -->
            <img src="./Directory.png" alt="Directory">
        </div>

    </nav>

</header>

<main class="main-content">

    <section class="left-panel">

        <div class="page-title">
            3D Map
        </div>

        <div class="map-container">

    <script
        src="https://static.kuula.io/embed.js"
        data-kuula="https://kuula.co/share/collection/7TLjg?logo=1&info=1&fs=1&vr=0&sd=1&thumbs=1"
        data-width="100%"
        data-height="457px">
    </script>

</div>

    </section>

    <aside class="right-panel">

        <button class="building-btn">Building A</button>

        <button class="building-btn">Building B</button>

        <button class="building-btn">Building C</button>

    </aside>

</main>

</body>
</html>
